<style>

<main>
  <div><span class="tag">프로젝트 소개</span></div>
  <p class="intro">우리는 매일 다양한 감정을 느끼며 살아갑니다. 하지만 우리가 알고 있는 감정의 이름은 너무나도 적습니다.<br>
  말로 꺼내지 못해 혼자 삭혔던 그 감정들, 세상 어딘가엔 이미 이름이 있었습니다. 이 프로젝트는 누구나 겪지만 설명하지 못했던 감정들의 이름을 알려주는 아카이브입니다.<br>
  이름을 아는 것만으로도, 그 감정은 조금 덜 외로워집니다.</p>
</main>

<footer>
